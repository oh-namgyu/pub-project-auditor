name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check pub_auditor tests

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + test deps
        run: |
          pip install -e .
          pip install pytest pytest-cov httpx

      - name: Run pytest with coverage
        run: pytest tests/ -v --cov=pub_auditor --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to job summary
        if: always() && matrix.python-version == '3.12'
        run: |
          echo '## Coverage (Python 3.12)' >> $GITHUB_STEP_SUMMARY
          python -c "import xml.etree.ElementTree as ET; r=ET.parse('coverage.xml').getroot(); print(f'Line coverage: {float(r.get(\"line-rate\"))*100:.1f}%')" >> $GITHUB_STEP_SUMMARY
